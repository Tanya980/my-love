<!DOCTYPE html>
<html>
<head>
    <title>For Slava ❤️</title>

    <style>
        body {
            background: linear-gradient(to bottom, #000000, #1a1a1a);
            color: white;
            text-align: center;
            font-family: Arial;
            padding: 30px;
            overflow-x: hidden;
        }

        h1 { margin-bottom: 10px; }

        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: white;
        }

        #output {
            margin-top: 30px;
            font-size: 20px;
        }

        img {
            width: 200px;
            margin: 10px;
            border-radius: 10px;
        }

        #secretBtn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0.1;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<h1>AI Analysis Report</h1>
<p>Subject: Slava</p>

<p>Intelligence: 99%</p>
<p>Kindness: 100%</p>
<p>Cuteness: ERROR (too high 😄)</p>

<hr>

<h2>Our memories 📸</h2>

<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">

<hr>

<h2>Choose action:</h2>

<p id="loading">Initializing AI model...</p>

<button onclick="love()">Run Model</button>
<button onclick="predict()">Make Prediction</button>
<button onclick="errorMsg()">Debug Mode</button>
<button onclick="future()">Future</button>

<p id="output"></p>

<button id="secretBtn" onclick="secret()">.</button>

<script>
function love() {
    document.getElementById("output").innerHTML = "Result: I love you ❤️";
}

function predict() {
    document.getElementById("output").innerHTML = "Prediction: you are the best thing in my life 💖";
}

function errorMsg() {
    document.getElementById("output").innerHTML = "Error: too much love detected 💔";
}

function future() {
    document.getElementById("output").innerHTML = "Future prediction: you + me = something very special ✨";
}

setTimeout(() => {
    document.getElementById("loading").innerHTML = "Loading memories...";
}, 1500);

setTimeout(() => {
    document.getElementById("loading").innerHTML = "Analyzing feelings...";
}, 3000);

setTimeout(() => {
    document.getElementById("loading").innerHTML = "Model ready ❤️";
}, 4500);

function secret() {
    document.body.innerHTML = `
        <h1>Secret unlocked 💖</h1>
        <p>С днём рождения, Слава ❤️</p>
        <p>Я очень рада, что ты есть в моей жизни</p>
        <p>Ты правда особенный для меня</p>
        <p>И я хочу, чтобы ты всегда был счастлив</p>
        <p>Я тебя люблю 💔</p>
    `;
}

/* ❤️ ПАДАЮЩИЕ СЕРДЕЧКИ */
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.top = "-10px";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = "20px";
    heart.style.animation = "fall 5s linear";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 500);

/* 💥 ВЗРЫВ СЕРДЕЦ ПРИ КЛИКЕ */
document.addEventListener("click", function(e) {
    for (let i = 0; i < 10; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";

        heart.style.position = "fixed";
        heart.style.left = e.clientX + "px";
        heart.style.top = e.clientY + "px";
        heart.style.fontSize = "20px";

        document.body.appendChild(heart);

        let x = (Math.random() - 0.5) * 200;
        let y = (Math.random() - 0.5) * 200;

        heart.animate([
            { transform: "translate(0,0)", opacity: 1 },
            { transform: translate(${x}px, ${y}px), opacity: 0 }
        ], {
            duration: 1000
        });

        setTimeout(() => heart.remove(), 1000);
    }
});

</script>

<p style="margin-top:50px; opacity:0.7;">
Final Output: you are loved more than you think ❤️
</p>

</body>
</html>
